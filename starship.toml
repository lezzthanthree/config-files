format = """
[ΌΓ╢](#9A348E)\
$os\
$username\
[ΌΓ░](bg:#DA627D fg:#9A348E)\
$directory\
[ΌΓ░](fg:#DA627D bg:#344f9a)\
$git_branch\
$git_status\
[ΌΓ░](fg:#344f9a bg:#8d86d8)\
$c\
$dotnet\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$python\
$conda\
$rust\
$scala\
[ΌΓ░](fg:#8d86d8 bg:#33658A)\
