gui:
  nerdFontsVersion: "3"
  showBottomLine: false
  skipDiscardChangeWarning: true
os:
  editPreset: 'nvim'
notARepository: 'skip'
keybinding:
  global:
    undo: '<c-z>'
    redo: '<c-y>'
  files:
    viewResetOptions: '<end>'
  commits:
    renameCommit: 'r'
    viewResetOptions: '<delete>'
confirmOnQuit: true
